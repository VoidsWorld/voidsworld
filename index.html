<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoidsWorld — Access Portal</title>
  </head>
<body>

  <div class="portal-bg"></div>
  <div class="grid-lines"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="portal-card">
    <div class="portal-logo">
      <div class="sigil">Ω</div>
      <h1>VOIDSWORLD</h1>
      <p>Secure Node Access</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Enter Node</button>
      <button class="auth-tab" data-tab="register">Generate Key</button>
    </div>

    <div class="auth-panel active" id="panel-login">
      <div class="field-group">
        <label for="portal-key">Authorization Key</label>
        <input type="text" id="portal-key" placeholder="VW-XXXX-XXXX-XXXX" autocomplete="off" />
      </div>
      <button class="btn-primary" id="btn-login">Verify Access</button>
      <div class="status-msg" id="login-status"></div>
    </div>

    <div class="auth-panel" id="panel-register">
      <div class="field-group">
        <label>Your Generated Key</label>
        <div class="key-display" id="generated-key-container">
          <span id="key-text">Click below to generate...</span>
          <span class="copy-icon" id="copy-btn">COPY</span>
        </div>
      </div>
      <button class="btn-primary" id="btn-generate">Generate Access Token</button>
      <div class="status-msg" id="gen-status"></div>
    </div>
  </div>

  <script>
    // 1. Tab Switching
    const tabs = document.querySelectorAll('.auth-tab');
    const panels = document.querySelectorAll('.auth-panel');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
      });
    });

    // 2. Key Generation
    const btnGenerate = document.getElementById('btn-generate');
    const keyText = document.getElementById('key-text');
    const genStatus = document.getElementById('gen-status');

    btnGenerate.addEventListener('click', () => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      const genSegment = () => Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      const newKey = `VW-${genSegment()}-${genSegment()}-${genSegment()}`;
      
      keyText.textContent = newKey;
      localStorage.setItem('voidsWorld_key', newKey);
      
      genStatus.textContent = "Key generated! Save this.";
      genStatus.className = "status-msg success";
      genStatus.style.display = "block";
    });

    // 3. Login Verification
    const btnLogin = document.getElementById('btn-login');
    const inputKey = document.getElementById('portal-key');
    const loginStatus = document.getElementById('login-status');

    btnLogin.addEventListener('click', () => {
      const storedKey = localStorage.getItem('voidsWorld_key');
      if (inputKey.value.trim().toUpperCase() === storedKey && storedKey !== null) {
        loginStatus.textContent = "Access Granted. Redirecting...";
        loginStatus.className = "status-msg success";
      } else {
        loginStatus.textContent = "Access Denied. Invalid Token.";
        loginStatus.className = "status-msg error";
      }
      loginStatus.style.display = "block";
    });

    // 4. Copy to Clipboard
    document.getElementById('copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(keyText.textContent);
      alert("Key copied to clipboard!");
    });
  </script>
</body>
</html>
