<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --void-black: #05020d;
      --deep-purple: #0d0520;
      --purple-mid: #2a0a5e;
      --purple-bright: #7c3aed;
      --purple-glow: #a855f7;
      --purple-light: #d8b4fe;
      --accent-violet: #6d28d9;
      --neon-purple: #c084fc;
      --dark-glass: rgba(13, 5, 32, 0.85);
      --glass-border: rgba(124, 58, 237, 0.3);
      --text-primary: #f0e6ff;
      --text-secondary: #a78bbd;
      --grad-main: linear-gradient(135deg, #0d0520 0%, #1a0636 40%, #2d0a6e 100%);
      --grad-purple: linear-gradient(135deg, #7c3aed, #a855f7, #c084fc);
      --grad-card: linear-gradient(145deg, rgba(42,10,94,0.6), rgba(13,5,32,0.9));
      --glow-purple: 0 0 30px rgba(168,85,247,0.4), 0 0 60px rgba(124,58,237,0.2);
      --glow-sm: 0 0 12px rgba(168,85,247,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--grad-main);
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPulse 8s ease-in-out infinite;
    }
    @keyframes gridPulse {
      0%,100% { opacity: 0.4; } 50% { opacity: 0.9; }
    }

    .orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.25; animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: #7c3aed; top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #a855f7; bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: #6d28d9; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-20px) scale(1.05); }
      66% { transform: translate(-20px,30px) scale(0.95); }
    }

    /* Main layout */
    .auth-page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%; max-width: 460px;
    }

    /* Logo */
    .logo-area {
      text-align: center; margin-bottom: 40px;
    }
    .logo-icon {
      width: 72px; height: 72px; margin: 0 auto 16px;
      background: var(--grad-purple);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: var(--glow-purple);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: var(--glow-purple); }
      50% { box-shadow: 0 0 50px rgba(168,85,247,0.7), 0 0 100px rgba(124,58,237,0.3); }
    }
    .logo-title {
      font-family: 'Orbitron', monospace;
      font-size: 2.2rem; font-weight: 900;
      background: var(--grad-purple);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
    }
    .logo-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: var(--text-secondary);
      letter-spacing: 3px; margin-top: 6px;
      text-transform: uppercase;
    }

    /* Auth card */
    .auth-card {
      background: var(--dark-glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .auth-tabs {
      display: flex; gap: 4px; margin-bottom: 32px;
      background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px;
    }
    .auth-tab {
      flex: 1; padding: 10px 16px;
      background: transparent; border: none;
      color: var(--text-secondary); cursor: pointer;
      border-radius: 9px; font-size: 0.875rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
    }
    .auth-tab.active {
      background: var(--grad-purple);
      color: #fff; box-shadow: var(--glow-sm);
    }

    /* Social auth buttons */
    .social-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
      margin-bottom: 24px;
    }
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 12px; color: var(--text-primary);
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease; font-family: 'Inter', sans-serif;
    }
    .social-btn:hover {
      background: rgba(124,58,237,0.2);
      border-color: var(--purple-bright);
      box-shadow: var(--glow-sm); transform: translateY(-1px);
    }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--glass-border); }
    .divider-text { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; font-family: 'JetBrains Mono', monospace; }

    /* Form fields */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 0.75rem; font-weight: 600;
      color: var(--neon-purple); letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
    }
    .field input {
      width: 100%; padding: 14px 16px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 12px; color: var(--text-primary);
      font-size: 0.9rem; font-family: 'Inter', sans-serif;
      transition: all 0.2s ease; outline: none;
    }
    .field input::placeholder { color: rgba(167,139,189,0.4); }
    .field input:focus {
      border-color: var(--purple-bright);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15), var(--glow-sm);
      background: rgba(42,10,94,0.3);
    }

    /* Key display */
    .key-display {
      display: none; margin-top: 16px;
      padding: 16px; background: rgba(0,0,0,0.5);
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 12px;
    }
    .key-display.visible { display: block; }
    .key-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--neon-purple);
      letter-spacing: 2px; margin-bottom: 8px;
    }
    .key-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem; color: #c084fc;
      word-break: break-all; line-height: 1.6;
    }
    .key-note {
      font-size: 0.72rem; color: var(--text-secondary);
      margin-top: 8px; font-style: italic;
    }

    /* Primary button */
    .btn-primary {
      width: 100%; padding: 15px;
      background: var(--grad-purple);
      border: none; border-radius: 12px;
      color: #fff; font-size: 0.95rem; font-weight: 700;
      font-family: 'Orbitron', monospace; letter-spacing: 2px;
      cursor: pointer; transition: all 0.2s ease;
      box-shadow: var(--glow-sm); margin-top: 8px;
      text-transform: uppercase;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow-purple);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none;
    }

    .btn-secondary {
      width: 100%; padding: 13px;
      background: transparent;
      border: 1px solid var(--glass-border);
      border-radius: 12px; color: var(--text-secondary);
      font-size: 0.85rem; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.2s ease; margin-top: 8px;
    }
    .btn-secondary:hover {
      border-color: var(--purple-bright); color: var(--text-primary);
      background: rgba(124,58,237,0.1);
    }

    /* OTP / code input */
    .otp-inputs {
      display: flex; gap: 8px; justify-content: center;
    }
    .otp-input {
      width: 48px; height: 56px; text-align: center;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 10px; color: var(--text-primary);
      font-size: 1.3rem; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.2s ease; outline: none;
    }
    .otp-input:focus {
      border-color: var(--purple-bright);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }

    .msg { padding: 10px 14px; border-radius: 10px; font-size: 0.82rem; margin-top: 12px; display: none; }
    .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: block; }
    .msg.success { background: rgba(124,58,237,0.15); border: 1px solid rgba(168,85,247,0.4); color: var(--purple-light); display: block; }

    /* Signed in state */
    #signed-in-view {
      display: none; text-align: center;
    }
    #signed-in-view.active { display: block; }

    .signed-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--grad-purple); margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; box-shadow: var(--glow-purple);
    }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Clerk override — hide default UI if present */
    #clerk-auth-container .cl-rootBox { display: none !important; }

    .footer-note {
      text-align: center; margin-top: 20px;
      font-size: 0.72rem; color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
    }
    .footer-note a { color: var(--neon-purple); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .auth-card { padding: 28px 20px; }
      .logo-title { font-size: 1.7rem; }
      .social-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

            <!-- OTP Verification step -->
            <div id="signup-step-2" class="panel">
              <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:20px;text-align:center;font-family:'JetBrains Mono',monospace;">
                // Verification code sent to your email
              </p>
              <div class="field">
                <label style="text-align:center;display:block;">Enter 6-Digit Code</label>
                <div class="otp-inputs" id="otp-inputs">
                  <input class="otp-input" maxlength="1" data-idx="0" />
                  <input class="otp-input" maxlength="1" data-idx="1" />
                  <input class="otp-input" maxlength="1" data-idx="2" />
                  <input class="otp-input" maxlength="1" data-idx="3" />
                  <input class="otp-input" maxlength="1" data-idx="4" />
                  <input class="otp-input" maxlength="1" data-idx="5" />
                </div>
              </div>
              <div id="otp-msg" class="msg"></div>
              <button class="btn-primary" onclick="handleVerify()">VERIFY & ENTER</button>
              <button class="btn-secondary" onclick="showStep(1)">← Back</button>
            </div>

          </div>

        </div><!-- /auth-card -->
        <div class="footer-note">
          VoidsWorld &nbsp;·&nbsp; Secured by <a href="https://clerk.com" target="_blank">Clerk</a>
        </div>
      </div>

      <!-- SIGNED IN VIEW -->
      <div id="signed-in-view">
        <div class="auth-card" style="text-align:center;">
          <div class="signed-avatar" id="user-avatar">⬡</div>
          <div style="font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;margin-bottom:6px;" id="user-name">Void User</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:24px;font-family:'JetBrains Mono',monospace;" id="user-email-display"></div>

          <div class="key-display visible" id="key-area">
            <div class="key-label">// YOUR VOID KEY</div>
            <div class="key-value" id="void-key-display">Generating...</div>
            <div class="key-note">This key is permanently bound to your account. Do not share it.</div>
          </div>

          <button class="btn-primary" style="margin-top:24px;" onclick="enterDashboard()">ENTER DASHBOARD →</button>
          <button class="btn-secondary" onclick="handleSignOut()">Sign Out</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ──────────────────────────────────────────────
    //  CLERK INIT
    // ──────────────────────────────────────────────
    let clerk = null;

    window.addEventListener('load', async () => {
      try {
        await window.Clerk.load({
          appearance: { baseTheme: undefined }
        });
        clerk = window.Clerk;
        initAuthState();
        setupOTP();
      } catch (err) {
        console.error('Clerk load error:', err);
      }
    });

    function initAuthState() {
      try {
        if (clerk.user) {
          showSignedIn(clerk.user);
        }
        clerk.addListener(({ user }) => {
          if (user) showSignedIn(user);
          else showSignedOut();
        });
      } catch (e) { console.error('Auth state error:', e); }
    }

    // ──────────────────────────────────────────────
    //  KEY GENERATION — deterministic per user ID
    // ──────────────────────────────────────────────
    async function generateVoidKey(userId) {
      try {
        const stored = localStorage.getItem('vw_key_' + userId);
        if (stored) return stored;

        // Generate a cryptographically derived key from userId + salt
        const salt = 'voidsworld_2025_secure_salt';
        const encoder = new TextEncoder();
        const data = encoder.encode(userId + salt);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        // Format: VW-XXXX-XXXX-XXXX-XXXX
        const key = 'VW-' + [
          hex.slice(0, 4).toUpperCase(),
          hex.slice(4, 8).toUpperCase(),
          hex.slice(8, 12).toUpperCase(),
          hex.slice(12, 16).toUpperCase()
        ].join('-');

        localStorage.setItem('vw_key_' + userId, key);
        return key;
      } catch (e) {
        console.error('Key gen error:', e);
        return 'VW-ERROR-KEY';
      }
    }

    // ──────────────────────────────────────────────
    //  UI STATE
    // ──────────────────────────────────────────────
    function showSignedIn(user) {
      try {
        document.getElementById('signed-out-view').style.display = 'none';
        document.getElementById('signed-in-view').style.display = 'block';

        const name = user.firstName || user.username || 'Void User';
        const email = user.primaryEmailAddress?.emailAddress || '';
        const initials = name.charAt(0).toUpperCase();

        document.getElementById('user-avatar').textContent = initials;
        document.getElementById('user-name').textContent = name;
        document.getElementById('user-email-display').textContent = email;

        generateVoidKey(user.id).then(key => {
          document.getElementById('void-key-display').textContent = key;
        });
      } catch (e) { console.error('showSignedIn error:', e); }
    }

    function showSignedOut() {
      try {
        document.getElementById('signed-out-view').style.display = 'block';
        document.getElementById('signed-in-view').style.display = 'none';
      } catch (e) { console.error('showSignedOut error:', e); }
    }

    // ──────────────────────────────────────────────
    //  TAB SWITCHING
    // ──────────────────────────────────────────────
    function switchTab(tab) {
      try {
        document.querySelectorAll('.auth-tab').forEach((t, i) => {
          t.classList.toggle('active', (tab === 'signin' && i === 0) || (tab === 'signup' && i === 1));
        });
        document.getElementById('signin-panel').classList.toggle('active', tab === 'signin');
        document.getElementById('signup-panel').classList.toggle('active', tab === 'signup');
        clearMessages();
      } catch (e) { console.error('Tab switch error:', e); }
    }

    function showStep(n) {
      try {
        document.getElementById('signup-step-1').classList.toggle('active', n === 1);
        document.getElementById('signup-step-2').classList.toggle('active', n === 2);
      } catch (e) { console.error('showStep error:', e); }
    }

    function clearMessages() {
      ['signin-msg','signup-msg','otp-msg'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.className = 'msg'; el.textContent = ''; }
      });
    }

    function showMsg(id, text, type = 'error') {
      try {
        const el = document.getElementById(id);
        if (!el) return;
        el.className = 'msg ' + type;
        el.textContent = text;
      } catch (e) { console.error('showMsg error:', e); }
    }

    // ──────────────────────────────────────────────
    //  SOCIAL AUTH
    // ──────────────────────────────────────────────
    async function signInWith(strategy) {
      try {
        if (!clerk) return showMsg('signin-msg', 'Auth system loading...', 'error');
        await clerk.signIn.authenticateWithRedirect({
          strategy,
          redirectUrl: window.location.origin + '/sso-callback.html',
          redirectUrlComplete: window.location.href
        });
      } catch (err) {
        console.error('Social auth error:', err);
        showMsg('signin-msg', err.errors?.[0]?.longMessage || 'Authentication failed. Please try again.', 'error');
      }
    }

    // ──────────────────────────────────────────────
    //  EMAIL SIGN IN
    // ──────────────────────────────────────────────
    async function handleSignIn() {
      try {
        if (!clerk) return showMsg('signin-msg', 'Auth system loading...', 'error');
        const email = document.getElementById('signin-email').value.trim();
        const password = document.getElementById('signin-password').value;

        if (!email || !password) return showMsg('signin-msg', 'Please fill in all fields.', 'error');
        if (!isValidEmail(email)) return showMsg('signin-msg', 'Enter a valid email address.', 'error');

        const btn = event.target.closest('button');
        setLoading(btn, true, 'ENTERING...');

        try {
          const result = await clerk.signIn.create({ identifier: email, password });
          if (result.status === 'complete') {
            await clerk.setActive({ session: result.createdSessionId });
          } else {
            showMsg('signin-msg', 'Additional verification required.', 'error');
          }
        } catch (err) {
          showMsg('signin-msg', err.errors?.[0]?.longMessage || 'Sign in failed. Check your credentials.', 'error');
        } finally {
          setLoading(btn, false, 'ENTER THE VOID');
        }
      } catch (e) { console.error('handleSignIn error:', e); }
    }

    // ──────────────────────────────────────────────
    //  EMAIL SIGN UP
    // ──────────────────────────────────────────────
    let signUpAttempt = null;

    async function handleSignUp() {
      try {
        if (!clerk) return showMsg('signup-msg', 'Auth system loading...', 'error');
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;

        if (!email || !password) return showMsg('signup-msg', 'Please fill in all fields.', 'error');
        if (!isValidEmail(email)) return showMsg('signup-msg', 'Enter a valid email address.', 'error');
        if (password.length < 8) return showMsg('signup-msg', 'Password must be at least 8 characters.', 'error');

        const btn = event.target.closest('button');
        setLoading(btn, true, 'CREATING...');

        try {
          signUpAttempt = await clerk.signUp.create({
            emailAddress: email,
            password
          });
          await signUpAttempt.prepareEmailAddressVerification({ strategy: 'email_code' });
          showStep(2);
        } catch (err) {
          showMsg('signup-msg', err.errors?.[0]?.longMessage || 'Sign up failed. Try again.', 'error');
        } finally {
          setLoading(btn, false, 'CREATE VOID ACCOUNT');
        }
      } catch (e) { console.error('handleSignUp error:', e); }
    }

    // ──────────────────────────────────────────────
    //  OTP VERIFY
    // ──────────────────────────────────────────────
    async function handleVerify() {
      try {
        const inputs = document.querySelectorAll('.otp-input');
        const code = Array.from(inputs).map(i => i.value).join('').trim();
        if (code.length < 6) return showMsg('otp-msg', 'Enter the full 6-digit code.', 'error');

        const btn = event.target.closest('button');
        setLoading(btn, true, 'VERIFYING...');

        try {
          const result = await signUpAttempt.attemptEmailAddressVerification({ code });
          if (result.status === 'complete') {
            await clerk.setActive({ session: result.createdSessionId });
          } else {
            showMsg('otp-msg', 'Verification incomplete. Please try again.', 'error');
          }
        } catch (err) {
          showMsg('otp-msg', err.errors?.[0]?.longMessage || 'Invalid code. Please try again.', 'error');
        } finally {
          setLoading(btn, false, 'VERIFY & ENTER');
        }
      } catch (e) { console.error('handleVerify error:', e); }
    }

    function setupOTP() {
      try {
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, idx) => {
          input.addEventListener('input', (e) => {
            const val = e.target.value.replace(/\D/g, '');
            e.target.value = val.charAt(0);
            if (val && idx < inputs.length - 1) inputs[idx + 1].focus();
          });
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && idx > 0) inputs[idx - 1].focus();
          });
          input.addEventListener('paste', (e) => {
            try {
              const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
              inputs.forEach((inp, i) => { if (paste[i]) inp.value = paste[i]; });
              inputs[Math.min(paste.length, inputs.length - 1)].focus();
              e.preventDefault();
            } catch (err) {}
          });
        });
      } catch (e) { console.error('setupOTP error:', e); }
    }

    // ──────────────────────────────────────────────
    //  SIGN OUT
    // ──────────────────────────────────────────────
    async function handleSignOut() {
      try {
        await clerk.signOut();
      } catch (e) { console.error('signOut error:', e); }
    }

    function enterDashboard() {
      window.location.href = 'dashboard.html';
    }

    // ──────────────────────────────────────────────
    //  UTILS
    // ──────────────────────────────────────────────
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function setLoading(btn, loading, text) {
      try {
        if (!btn) return;
        btn.disabled = loading;
        btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
      } catch (e) {}
    }
  </script>
</body>
</html>
