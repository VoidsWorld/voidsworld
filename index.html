<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoidsWorld — Access Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── INDEX-SPECIFIC LAYOUT ── */
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

    .portal-bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, #1a003a 0%, #0d0d0d 50%, #000510 100%);
    }
    .portal-bg::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 20%, rgba(120,0,255,0.18) 0%, transparent 60%),
                  radial-gradient(ellipse at 10% 80%, rgba(80,0,200,0.12) 0%, transparent 50%);
    }
    .grid-lines {
      position: fixed; inset: 0; z-index: 0; opacity: 0.06;
      background-image:
        linear-gradient(rgba(150,0,255,0.8) 1px, transparent 1px),
        linear-gradient(90deg, rgba(150,0,255,0.8) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPulse 8s ease-in-out infinite alternate;
    }
    @keyframes gridPulse { from { opacity: 0.04; } to { opacity: 0.09; } }

    /* Floating orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; animation: orbFloat 12s ease-in-out infinite alternate; }
    .orb-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: radial-gradient(circle, rgba(120,0,255,0.25), transparent 70%); animation-duration: 10s; }
    .orb-2 { width: 300px; height: 300px; bottom: -80px; right: -80px; background: radial-gradient(circle, rgba(80,0,180,0.2), transparent 70%); animation-duration: 14s; animation-delay: -4s; }
    .orb-3 { width: 200px; height: 200px; top: 50%; left: 60%; background: radial-gradient(circle, rgba(160,0,255,0.15), transparent 70%); animation-duration: 8s; animation-delay: -2s; }
    @keyframes orbFloat { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }

    /* Portal card */
    .portal-card {
      position: relative; z-index: 10;
      width: min(460px, 92vw);
      background: rgba(10,0,20,0.85);
      border: 1px solid rgba(150,0,255,0.3);
      border-radius: 20px;
      padding: 48px 40px 40px;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 60px rgba(120,0,255,0.15), 0 0 120px rgba(80,0,200,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(30px) scale(0.97); } to { opacity:1; transform: translateY(0) scale(1); } }

    .portal-logo {
      text-align: center; margin-bottom: 36px;
    }
    .portal-logo .sigil {
      width: 64px; height: 64px; margin: 0 auto 16px;
      border: 2px solid rgba(150,0,255,0.5);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(100,0,255,0.1);
      box-shadow: 0 0 30px rgba(120,0,255,0.3);
      font-size: 28px;
    }
    .portal-logo h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem; font-weight: 900;
      background: linear-gradient(135deg, #bf7fff 0%, #7b00ff 50%, #4400aa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 0.1em;
    }
    .portal-logo p {
      font-size: 0.75rem; color: rgba(180,130,255,0.6);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.2em; margin-top: 4px;
    }

    /* Tabs */
    .auth-tabs {
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(150,0,255,0.15);
      border-radius: 10px; padding: 4px; margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1; padding: 10px; border: none; background: transparent;
      color: rgba(180,130,255,0.5); font-family: 'Inter', sans-serif;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer; border-radius: 7px;
      transition: all 0.25s ease;
    }
    .auth-tab.active {
      background: linear-gradient(135deg, rgba(120,0,255,0.4), rgba(80,0,200,0.3));
      color: #d4aaff;
      box-shadow: 0 0 20px rgba(120,0,255,0.2);
    }

    /* Forms */
    .auth-panel { display: none; animation: fadeSlide 0.3s ease; }
    .auth-panel.active { display: block; }
    @keyframes fadeSlide { from { opacity:0; transform: translateX(8px); } to { opacity:1; transform: translateX(0); } }

    .field-group { margin-bottom: 18px; }
    .field-group label {
      display: block; margin-bottom: 7px;
      font-size: 0.72rem; font-weight: 600;
      color: rgba(180,130,255,0.7); letter-spacing: 0.12em;
      text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
    }
    .field-group input {
      width: 100%; padding: 13px 16px;
      background: rgba(20,0,40,0.6);
      border: 1px solid rgba(150,0,255,0.25);
      border-radius: 10px;
      color: #e8d5ff; font-family: 'Inter', sans-serif; font-size: 0.92rem;
      outline: none; transition: all 0.2s ease; box-sizing: border-box;
    }
    .field-group input:focus {
      border-color: rgba(150,0,255,0.7);
      background: rgba(30,0,60,0.7);
      box-shadow: 0 0 0 3px rgba(120,0,255,0.12), 0 0 20px rgba(120,0,255,0.1);
    }
    .field-group input::placeholder { color: rgba(150,100,220,0.4); }

    .key-display {
      background: rgba(10,0,25,0.8);
      border: 1px solid rgba(120,0,255,0.35);
      border-radius: 10px; padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem; color: #a855f7;
      letter-spacing: 0.05em; word-break: break-all;
      min-height: 48px; display: flex; align-items: center;
      gap: 10px; cursor: pointer; transition: border-color 0.2s;
    }
    .key-display:hover { border-color: rgba(150,0,255,0.6); }
    .key-display .copy-icon { margin-left: auto; opacity: 0.6; font-size: 1rem; flex-shrink: 0; }

    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #7b00ff 0%, #4400bb 60%, #2d007a 100%);
      border: 1px solid rgba(150,0,255,0.5);
      border-radius: 10px; color: #f0e0ff;
      font-family: 'Orbitron', monospace; font-size: 0.82rem;
      font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 24px rgba(120,0,255,0.3);
      transition: all 0.2s ease; position: relative; overflow: hidden;
    }
    .btn-primary::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(120,0,255,0.45); }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status-msg {
      margin-top: 14px; padding: 11px 14px; border-radius: 8px;
      font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;
      display: none; animation: fadeIn 0.25s ease;
    }
    .status-msg.success { background: rgba(0,255,100,0.07); border: 1px solid rgba(0,255,100,0.25); color: #7fffaa; }
    .status-msg.error   { background: rgba(255,50,50,0.07);  border: 1px solid rgba(255,50,50,0.25);  color: #ff9090; }
    .status-msg.info    { background: rgba(120,0,255,0.08);  border: 1px solid rgba(120,0,255,0.3);   color: #c4a0ff; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
    .divider span { flex: 1; height: 1px; background: rgba(150,0,255,0.2); }
    .divider em { font-size: 0.7rem; color: rgba(150,100,220,0.5); font-style: normal; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }

    /* OAuth Elements */
    .oauth-grid { display: flex; flex-direction: column; gap: 10px; }
    .btn-oauth {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 12px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(150,0,255,0.2); border-radius: 10px;
      color: #e8d5ff; font-family: 'Inter', sans-serif; font-size: 0.85rem;
      font-weight: 500; cursor: pointer; transition: all 0.2s ease;
      box-sizing: border-box;
    }
    .btn-oauth:hover {
      background: rgba(120,0,255,0.1); border-color: rgba(150,0,255,0.45);
      box-shadow: 0 0 15px rgba(120,0,255,0.1); color: #fff;
    }
    .btn-oauth svg { width: 18px; height: 18px; fill: currentColor; }

    /* Verification Form Styles */
    .verification-text { font-size: 0.85rem; color: rgba(180,130,255,0.8); line-height: 1.5; margin-bottom: 16px; font-family: 'Inter', sans-serif; }
    .verification-email { color: #a855f7; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>

  <!-- BACKGROUND GRAPHICS -->
  <div class="portal-bg"></div>
  <div class="grid-lines"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- PORTAL ACCESS CARD -->
  <main class="portal-card">
    
    <div class="portal-logo">
      <div class="sigil">Ω</div>
      <h1>VOIDSWORLD</h1>
      <p>SECURE GATEWAY v3.4.0</p>
    </div>

    <!-- SYSTEM TABS -->
    <div class="auth-tabs" id="authTabs">
      <button class="auth-tab active" id="tabSignIn">Sign In</button>
      <button class="auth-tab" id="tabSignUp">Sign Up</button>
    </div>
